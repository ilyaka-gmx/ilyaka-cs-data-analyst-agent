<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CS Data Analyst</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="light"]{
  --bg:#f4f5f7;--surface:#fff;--raised:#f0f1f3;--border:#e2e4e9;
  --text:#1a1c20;--text-dim:#5f6368;--text-faint:#9aa0a6;
  --accent:#0d9488;--accent-lit:#0f766e;--accent-bg:rgba(13,148,136,.08);
  --green:#16a34a;--yellow:#ca8a04;--red:#dc2626;
  --user-msg-bg:#0d9488;--user-msg-text:#fff;
  --bot-msg-bg:#fff;--bot-msg-border:#e2e4e9;
  --step-bg:#f8f9fa;--scrollbar:#d1d5db;--shadow:0 1px 3px rgba(0,0,0,.06);
  --step-route:#7c3aed;--step-tool:#0891b2;--step-result:#b45309;
  --status-bg:#f0f1f3;--status-border:#e2e4e9;
  --tag-active-bg:#0d9488;--tag-active-text:#fff;
  --mt-working-bg:#e0f2fe;--mt-working-fg:#0369a1;
  --mt-episodic-bg:#fef3c7;--mt-episodic-fg:#b45309;
  --mt-semantic-bg:#fce7f3;--mt-semantic-fg:#be185d;
  --mt-procedural-bg:#ecfccb;--mt-procedural-fg:#4d7c0f;
}
[data-theme="dark"]{
  --bg:#111318;--surface:#1a1d23;--raised:#22252d;--border:#2e3039;
  --text:#d1d2d9;--text-dim:#8b8d96;--text-faint:#5c5e66;
  --accent:#2dd4bf;--accent-lit:#5eead4;--accent-bg:rgba(45,212,191,.1);
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --user-msg-bg:#115e59;--user-msg-text:#ccfbf1;
  --bot-msg-bg:#22252d;--bot-msg-border:#2e3039;
  --step-bg:#181b22;--scrollbar:#2e3039;--shadow:none;
  --step-route:#a78bfa;--step-tool:#22d3ee;--step-result:#facc15;
  --status-bg:#1a1d23;--status-border:#2e3039;
  --tag-active-bg:#2dd4bf;--tag-active-text:#111318;
  --mt-working-bg:#0c4a6e;--mt-working-fg:#7dd3fc;
  --mt-episodic-bg:#78350f;--mt-episodic-fg:#fde68a;
  --mt-semantic-bg:#831843;--mt-semantic-fg:#f9a8d4;
  --mt-procedural-bg:#365314;--mt-procedural-fg:#bef264;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background .2s,color .2s}

/* ── SIDEBAR ── */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:background .2s,border-color .2s}
.sb-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.sb-header .admin-mode-btn{margin-left:auto;font-size:11px;padding:3px 8px}
.sb-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff}
.sb-header .title{font-size:14px;font-weight:600;flex:1}

.sb-user{padding:8px 16px;border-bottom:1px solid var(--border)}
.sb-user label{display:block;font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.user-combo{position:relative}
.user-combo input{width:100%;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font:inherit;font-size:13px;transition:.2s}
.user-combo input:focus{outline:none;border-color:var(--accent)}
.user-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;max-height:150px;overflow-y:auto;z-index:5;box-shadow:0 4px 8px rgba(0,0,0,.1)}
.user-dropdown.open{display:block}
.user-dropdown-item{padding:5px 8px;cursor:pointer;font-size:13px;transition:.1s}
.user-dropdown-item:hover{background:var(--accent-bg);color:var(--accent)}
.user-dropdown-item.active{font-weight:600;color:var(--accent)}

.sb-actions{padding:8px 16px;display:flex;gap:6px}
.btn-new{flex:1;padding:7px 12px;background:var(--accent);border:none;border-radius:5px;color:#fff;font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;text-align:center}
.btn-new:hover{background:var(--accent-lit)}

.sb-search{padding:6px 16px}
.sb-search input{width:100%;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font:inherit;font-size:12px;transition:.2s}
.sb-search input:focus{outline:none;border-color:var(--accent)}
.sb-search input::placeholder{color:var(--text-faint)}

.sb-tag-filter{padding:4px 16px 2px;display:flex;flex-wrap:wrap;gap:4px;min-height:0}
.tag-pill{display:inline-block;font-size:10px;padding:2px 7px;background:var(--accent-bg);color:var(--accent);border-radius:3px;margin:0;cursor:pointer;transition:.15s;border:1px solid transparent;user-select:none}
.tag-pill:hover{border-color:var(--accent)}
.tag-pill.active{background:var(--tag-active-bg);color:var(--tag-active-text);border-color:var(--tag-active-bg)}
.sb-tag-filter-empty{font-size:10px;color:var(--text-faint);padding:0 16px 2px}

.sb-chats{flex:1;overflow-y:auto;padding:4px 0}
.sb-chats::-webkit-scrollbar{width:4px}
.sb-chats::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.chat-item{padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:.1s;position:relative}
.chat-item:hover{background:var(--accent-bg)}
.chat-item.active{border-left-color:var(--accent);background:var(--accent-bg)}
.chat-item .ci-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:40px}
.chat-item .ci-meta{font-size:11px;color:var(--text-faint);margin-top:2px}
.chat-item .ci-tags{margin-top:2px}
.ci-tag{display:inline-block;font-size:9px;padding:1px 5px;background:var(--accent-bg);color:var(--accent);border-radius:3px;margin-right:2px}
.ci-actions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:none;gap:2px}
.chat-item:hover .ci-actions{display:flex}
.ci-act{padding:3px 5px;background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-faint);border-radius:3px;transition:.15s;line-height:1}
.ci-act:hover{background:var(--raised);color:var(--text)}
.ci-act.del:hover{color:var(--red)}
.delete-all-user{display:block;padding:6px 16px;font-size:11px;color:var(--text-faint);cursor:pointer;transition:.15s;border:none;background:none;font-family:inherit;width:100%;text-align:left}
.delete-all-user:hover{color:var(--red)}

.sb-section{border-top:1px solid var(--border)}
.sb-toggle{display:flex;align-items:center;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-dim);user-select:none}
.sb-toggle:hover{color:var(--accent)}
.sb-toggle .arrow{margin-right:6px;font-size:10px;transition:transform .15s;display:inline-block}
.sb-toggle .arrow.open{transform:rotate(90deg)}
.sb-panel{display:none;padding:4px 16px 8px}
.sb-panel.open{display:block}

.tag-mgmt-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.tag-rm{display:inline-flex;align-items:center;gap:2px;font-size:11px;padding:2px 6px;background:var(--accent-bg);color:var(--accent);border-radius:3px;cursor:default}
.tag-rm .x{cursor:pointer;font-weight:700;margin-left:2px}
.tag-rm .x:hover{color:var(--red)}
.tag-add{display:flex;gap:4px;margin-top:4px}
.tag-add input{flex:1;padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font:inherit;font-size:11px}
.tag-add input:focus{outline:none;border-color:var(--accent)}
.tag-add button{padding:3px 8px;background:var(--accent);border:none;border-radius:3px;color:#fff;font-size:11px;cursor:pointer}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Tabs */
.tab-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);transition:.2s}
.tab-btn{padding:10px 20px;font:inherit;font-size:13px;font-weight:500;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-bar-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding-right:12px}
.tab-action{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:5px;font:inherit;font-size:12px;color:var(--text-dim);cursor:pointer;transition:.15s;white-space:nowrap}
.tab-action:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.theme-seg{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.theme-seg button{padding:4px 9px;border:none;background:none;font-size:11px;cursor:pointer;color:var(--text-dim);transition:.15s;font-family:inherit}
.theme-seg button:not(:last-child){border-right:1px solid var(--border)}
.theme-seg button.active{background:var(--accent);color:#fff}
.theme-seg button:hover:not(.active){background:var(--accent-bg);color:var(--accent)}

.tab-content{display:none;flex:1;overflow-y:auto}
.tab-content.active{display:flex;flex-direction:column}

/* Chat messages */
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}

.msg{max-width:640px;padding:10px 14px;border-radius:8px;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word;box-shadow:var(--shadow);transition:.2s}
.msg.user{align-self:flex-end;background:var(--user-msg-bg);color:var(--user-msg-text);border-bottom-right-radius:2px}
.msg.bot{align-self:flex-start;background:var(--bot-msg-bg);border:1px solid var(--bot-msg-border);border-bottom-left-radius:2px}

.reasoning-toggle{cursor:pointer;color:var(--accent);font-size:12px;margin-top:6px;user-select:none;font-weight:500}
.reasoning-toggle:hover{text-decoration:underline}
.reasoning-content{display:none;margin-top:4px}
.reasoning-content.open{display:block}
.step{margin:2px 0;padding:3px 8px;background:var(--step-bg);border-radius:3px;font-family:'SF Mono',Consolas,monospace;font-size:11px;border-left:2px solid transparent;transition:.2s}
.step.route{color:var(--step-route);border-color:var(--step-route)}
.step.tool{color:var(--step-tool);border-color:var(--step-tool)}
.step.result{color:var(--step-result);border-color:var(--step-result)}
.msg-footer{font-size:11px;color:var(--text-faint);margin-top:6px}

/* Memory trace badges in chat */
.memory-trace{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.mt-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.mt-badge.working{background:var(--mt-working-bg);color:var(--mt-working-fg)}
.mt-badge.episodic{background:var(--mt-episodic-bg);color:var(--mt-episodic-fg)}
.mt-badge.semantic{background:var(--mt-semantic-bg);color:var(--mt-semantic-fg)}
.mt-badge.procedural{background:var(--mt-procedural-bg);color:var(--mt-procedural-fg)}

/* Suggestion chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:12px;cursor:pointer;color:var(--text-dim);transition:.15s;box-shadow:var(--shadow)}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.chip.rec{border-color:#e9967a;color:#c0623a;background:rgba(233,150,122,.08)}
.chip.rec:hover{border-color:#c0623a;color:#a04520;background:rgba(233,150,122,.18)}

/* Recommendation toggles */
.rec-toggles{padding:8px 16px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border)}
.rec-toggle-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none}
.rec-toggle-row input[type=checkbox]{accent-color:var(--accent);cursor:pointer}

/* Welcome */
.welcome{text-align:center;padding:48px 20px 24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.welcome h2{font-size:20px;font-weight:600}
.welcome p{font-size:14px;color:var(--text-dim);max-width:400px;line-height:1.5}
.welcome .chips{margin-top:12px;max-width:500px}

/* Typing animation */
.typing-indicator{align-self:flex-start;padding:10px 14px;background:var(--bot-msg-bg);border:1px solid var(--bot-msg-border);border-radius:8px;display:none;align-items:center;gap:4px;box-shadow:var(--shadow)}
.typing-indicator.visible{display:flex}
.typing-indicator .dot{width:5px;height:5px;background:var(--text-faint);border-radius:50%;animation:blink 1.2s infinite}
.typing-indicator .dot:nth-child(2){animation-delay:.2s}
.typing-indicator .dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.typing-indicator .typing-label{font-size:12px;color:var(--text-faint);margin-left:4px}

/* Compose bar */
.compose{padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);transition:.2s}
.compose input{flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:14px;transition:.2s}
.compose input:focus{outline:none;border-color:var(--accent)}
.compose input::placeholder{color:var(--text-faint)}
.compose button{padding:9px 20px;background:var(--accent);border:none;border-radius:6px;color:#fff;font:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.compose button:hover{background:var(--accent-lit)}
.compose button:disabled{background:var(--raised);color:var(--text-faint);cursor:not-allowed}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:12px;padding:4px 20px;border-top:1px solid var(--status-border);background:var(--status-bg);font-size:11px;color:var(--text-faint);transition:.2s;flex-shrink:0}
.status-bar .sep{color:var(--border)}
.health-seg{cursor:pointer;position:relative}
.health-seg:hover{color:var(--accent)}
.health-popover{display:none;position:absolute;bottom:24px;left:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;min-width:280px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:10;font-size:12px;color:var(--text)}
.health-popover.open{display:block}
.health-popover .hc{margin:3px 0}
.health-popover .hc-msg{color:var(--text-dim);font-size:11px;margin-left:18px}
.refresh-btn{margin-top:8px;padding:4px 10px;background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer;transition:.15s}
.refresh-btn:hover{background:var(--accent-lit)}

/* Admin tab */
.admin{padding:20px 24px}
.admin h3{font-size:16px;font-weight:600;margin-bottom:12px}
.admin-empty{color:var(--text-dim);font-size:14px}
.admin-card{border:1px solid var(--border);border-radius:6px;margin-bottom:10px;transition:.2s}
.admin-card-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.admin-card-header:hover{background:var(--accent-bg)}
.admin-card-header .arrow{font-size:10px;transition:transform .15s;display:inline-block}
.admin-card-header .arrow.open{transform:rotate(90deg)}
.admin-card-header .session-id{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text-faint);background:var(--raised);padding:1px 5px;border-radius:3px}
.admin-card-body{display:none;padding:0 14px 10px;font-size:12px}
.admin-card-body.open{display:block}
.admin-card-body .q-row{padding:6px 0;border-bottom:1px solid var(--border)}
.admin-card-body .q-row:last-child{border-bottom:none}
.admin-card-body .q-header{font-weight:500}
.admin-card-body .q-tool{font-family:monospace;font-size:11px;color:var(--step-tool);margin:2px 0 2px 12px}
.admin-card-body .q-response{color:var(--text-dim);margin-top:2px}
.admin-del-btn{margin-left:auto;padding:2px 8px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-faint);font-size:12px;cursor:pointer;transition:.15s;flex-shrink:0}
.admin-del-btn:hover{border-color:var(--red);color:var(--red);background:rgba(220,38,38,.08)}

/* Memory Insights tab */
.memory-tab{padding:20px 24px}
.memory-tab h3{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.memory-tab h3 .mem-refresh{padding:4px 10px;background:none;border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text-dim);cursor:pointer;transition:.15s;font-family:inherit}
.memory-tab h3 .mem-refresh:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.memory-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.memory-panel{border:1px solid var(--border);border-radius:8px;background:var(--surface);overflow:hidden;transition:.2s}
.mp-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mp-icon{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:14px;font-weight:600}
.mp-sub{font-size:11px;color:var(--text-faint)}
.mp-kpi{font-size:20px;font-weight:700;color:var(--accent);text-align:right}
.mp-body{padding:12px 16px;font-size:13px;line-height:1.6}
.mp-body .mp-row{display:flex;justify-content:space-between;margin:2px 0}
.mp-body .mp-label{color:var(--text-dim)}
.mp-body .mp-val{font-weight:500}
.mp-body .mp-list{margin-top:6px}
.mp-body .mp-list-item{padding:3px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.mp-body .mp-list-item:last-child{border-bottom:none}
.mp-body .mp-list-item .li-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.mp-body .mp-list-item .li-meta{font-size:11px;color:var(--text-faint);white-space:nowrap}
.mp-section-title{font-size:12px;font-weight:600;color:var(--text-dim);margin:8px 0 4px;text-transform:uppercase;letter-spacing:.3px}
.tool-bar-row{display:flex;align-items:center;gap:6px;margin:3px 0}
.tool-bar-name{width:110px;font-size:11px;font-family:'SF Mono',Consolas,monospace;text-align:right;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-bar{flex:1;height:14px;background:var(--raised);border-radius:2px;overflow:hidden}
.tool-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.tool-bar-count{font-size:11px;color:var(--text-faint);width:28px;text-align:right}
.qt-dist{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.qt-badge{font-size:11px;padding:2px 8px;border-radius:3px;background:var(--raised);color:var(--text-dim)}
.fact-user{font-size:12px;font-weight:600;color:var(--text);margin:6px 0 2px}
.fact-item{font-size:12px;color:var(--text-dim);margin:1px 0 1px 12px}
.fact-item::before{content:'\2022';margin-right:6px;color:var(--accent)}
.mp-empty{color:var(--text-faint);font-size:12px;font-style:italic}
.mp-delete-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.mp-delete-row select{flex:1;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font:inherit;font-size:11px}
.mp-delete-row select:focus{outline:none;border-color:var(--accent)}
.mp-delete-row button{padding:4px 10px;background:none;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:11px;color:var(--text-faint);cursor:pointer;transition:.15s;white-space:nowrap}
.mp-delete-row button:hover{border-color:var(--red);color:var(--red);background:rgba(220,38,38,.06)}

/* Admin mode button */
.admin-mode-btn{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:5px;font:inherit;font-size:12px;color:var(--text-dim);cursor:pointer;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.admin-mode-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.admin-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Admin sidebar stats */
.sb-stats{padding:12px 16px;flex:1;overflow-y:auto}
.stat-card{padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;background:var(--raised);transition:.2s}
.stat-card .stat-label{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px}
.stat-card .stat-val{font-size:18px;font-weight:700;color:var(--accent);margin:2px 0}
.stat-card .stat-detail{font-size:11px;color:var(--text-dim);line-height:1.4}
.stat-card .stat-detail .su{margin:1px 0}

/* Cleanup buttons row in admin */
.admin-cleanup{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.admin-cleanup button{padding:5px 12px;font:inherit;font-size:11px;border-radius:4px;cursor:pointer;transition:.15s;border:1px solid var(--border);background:none;color:var(--text-dim)}
.admin-cleanup button:hover{border-color:var(--red);color:var(--red);background:rgba(220,38,38,.06)}
.admin-user-badge{display:inline-block;font-size:9px;padding:1px 6px;background:var(--accent-bg);color:var(--accent);border-radius:3px;margin-left:6px;font-weight:600}

/* Judge card (side panel next to bot message) */
.msg-with-judge{display:flex;align-items:flex-start;gap:8px;align-self:flex-start;max-width:640px;position:relative}
.msg-with-judge .msg.bot{flex:1;min-width:0;max-width:none}
.judge-card{padding:6px;border-radius:8px;background:var(--surface);border:1px solid #d4a574;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);flex-shrink:0;align-self:flex-start;overflow:hidden}
[data-theme="dark"] .judge-card{border-color:#8b6914}
.judge-card.collapsed{width:36px;height:auto}
.judge-card.collapsed .judge-body{display:none}
.judge-card.collapsed .judge-header{flex-direction:column;gap:1px;align-items:center}
.judge-card.collapsed .judge-header .judge-icon{font-size:13px}
.judge-card.collapsed .judge-header .judge-label{display:none}
.judge-card.collapsed .judge-header .judge-score{margin:0;font-size:11px}
.judge-card:not(.collapsed){position:absolute;right:0;top:0;transform:translateX(calc(100% + 8px));width:220px;z-index:3;padding:10px 12px}
.judge-header{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.judge-header .judge-icon{font-size:14px}
.judge-header .judge-label{color:var(--text-dim);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.judge-header .judge-score{margin-left:auto;font-weight:700;font-size:13px;white-space:nowrap}
.judge-header .judge-score.pass{color:var(--green)}
.judge-header .judge-score.fail{color:var(--red)}
.judge-body{margin-top:6px}
.judge-dims{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.judge-dim{font-size:11px;color:var(--text-dim)}
.judge-dim .dim-label{font-weight:500;margin-right:3px}
.judge-dim .dim-dots{letter-spacing:1px}
.judge-issue{font-size:11px;color:var(--red);font-style:italic;margin:4px 0;line-height:1.3}
.judge-meta{font-size:10px;color:var(--text-faint)}
@media(max-width:768px){.msg-with-judge{max-width:92%}.judge-card:not(.collapsed){position:static;transform:none;width:auto}}
.status-group{display:inline-flex;align-items:center;gap:6px;padding:0 8px;border:1px solid var(--border);border-radius:4px;margin:0 2px}
.q-judge{font-size:11px;color:var(--text-dim);margin:3px 0 0 12px;border-left:2px solid #d4a574;padding-left:8px}
.q-judge.low{border-color:var(--red)}
.q-judge-issue{font-size:11px;color:var(--red);font-style:italic;margin:1px 0 0 22px}

@media(max-width:768px){.sidebar{display:none}.msg{max-width:92%}.memory-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">CS</div>
    <span class="title">Data Analyst</span>
    <button class="admin-mode-btn" id="adminModeBtn" title="Switch to Admin mode">&#9881; Admin</button>
  </div>

  <div class="sb-user">
    <label>User</label>
    <div class="user-combo" id="userCombo">
      <input id="userId" placeholder="default" autocomplete="off">
      <div class="user-dropdown" id="userDropdown"></div>
    </div>
  </div>

  <div class="sb-actions">
    <button class="btn-new" id="btnNew">+ New Chat</button>
  </div>

  <div class="sb-search">
    <input id="searchInput" placeholder="Search chats...">
  </div>

  <div id="tagFilterArea"></div>

  <div class="sb-chats" id="chatList"></div>

  <div class="sb-section">
    <div class="sb-toggle" id="tagToggle">
      <span class="arrow" id="tagsArrow">&#9654;</span> Chat Tags
    </div>
    <div class="sb-panel" id="tagsPanel"></div>
  </div>

  <div class="rec-toggles" id="recToggles">
    <label class="rec-toggle-row"><input type="checkbox" id="autoRecToggle" checked> Auto recommendations</label>
    <label class="rec-toggle-row"><input type="checkbox" id="pastSessionsToggle"> Use past sessions</label>
    <label class="rec-toggle-row"><input type="checkbox" id="qualityScoringToggle"> Judge evaluation &amp; scoring</label>
  </div>

  <div class="sb-stats" id="adminSidebar" style="display:none"></div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="chat" id="tabChat">Chat</button>
    <button class="tab-btn" data-tab="admin" id="tabAdmin" style="display:none">Chat Tracing</button>
    <button class="tab-btn" data-tab="memory" id="tabMemory" style="display:none">Memory Insights</button>
    <div class="tab-bar-right">
      <button class="tab-action" id="exportBtn" title="Export conversation as Markdown">Export &#8595;</button>
      <div class="theme-seg" id="themeSeg">
        <button data-tv="system" title="Follow system preference">Auto</button>
        <button data-tv="light" title="Light theme">&#9788;</button>
        <button data-tv="dark" title="Dark theme">&#9789;</button>
      </div>
    </div>
  </div>

  <!-- CHAT TAB -->
  <div class="tab-content active" id="chatTab">
    <div class="messages" id="messages"></div>
    <div class="compose">
      <input id="queryInput" placeholder="Ask about the customer service dataset...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div class="tab-content" id="adminTab">
    <div class="admin" id="adminContent"></div>
  </div>

  <!-- MEMORY INSIGHTS TAB -->
  <div class="tab-content" id="memoryTab">
    <div class="memory-tab" id="memoryContent"></div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="health-seg" id="healthSeg">&#9898; loading...</span>
    <span class="sep">|</span>
    <span id="datasetSeg">loading...</span>
    <span class="sep">|</span>
    <span id="tokenSeg">0 tok</span>
    <span class="sep">|</span>
    <span id="modelSeg">loading...</span>
  </div>
</div>

<script>
(function(){
"use strict";

/* ── Config ── */
var API = '';
var SUGGESTIONS = [
  {label:'What categories exist?', query:'What categories exist in the dataset?'},
  {label:'How many refund requests?', query:'How many refund requests did we get?'},
  {label:'Summarize FEEDBACK', query:'Summarize the FEEDBACK category.'},
  {label:'3 examples from SHIPPING', query:'Show me 3 examples from the SHIPPING category.'},
  {label:'Intent dist. in ACCOUNT', query:'What is the distribution of intents in the ACCOUNT category?'},
  {label:'Top customer issues', query:'What are the top customer issues in the dataset?'}
];

/* ── State ── */
var activeThread = null;
var chatMessages = [];
var allChats = [];
var allTags = [];
var allUsers = [];
var activeTagFilter = null;
var isSending = false;
var currentThemeMode = 'system';
var autoRecEnabled = localStorage.getItem('autoRec') !== 'false';
var usePastSessions = localStorage.getItem('pastSessions') === 'true';
var qualityScoringEnabled = localStorage.getItem('qualityScoring') === 'true';

/* ── DOM refs ── */
var $messages   = document.getElementById('messages');
var $queryInput = document.getElementById('queryInput');
var $sendBtn    = document.getElementById('sendBtn');
var $chatList   = document.getElementById('chatList');
var $search     = document.getElementById('searchInput');
var $userId     = document.getElementById('userId');
var $userDropdown = document.getElementById('userDropdown');
var $healthSeg  = document.getElementById('healthSeg');
var $datasetSeg = document.getElementById('datasetSeg');
var $tokenSeg   = document.getElementById('tokenSeg');
var $modelSeg   = document.getElementById('modelSeg');
var $tagsPanel  = document.getElementById('tagsPanel');
var $tagFilter  = document.getElementById('tagFilterArea');
var $adminContent = document.getElementById('adminContent');
var $memoryContent = document.getElementById('memoryContent');
var $exportBtn  = document.getElementById('exportBtn');

/* ── Util ── */
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function makeId(){return Math.random().toString(36).substring(2,10)}
function scrollBottom(){$messages.scrollTop=$messages.scrollHeight}
function getUser(){return $userId.value.trim()||'default'}

/* ══════════════════════════════════════════════════════════════════
   THEME (System / Light / Dark)
   ══════════════════════════════════════════════════════════════════ */

function applyTheme(mode){
  currentThemeMode = mode;
  var effective = mode;
  if(mode === 'system'){
    effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', effective);
  document.querySelectorAll('.theme-seg button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tv') === mode);
  });
  try{localStorage.setItem('theme', mode)}catch(e){}
}

document.querySelectorAll('.theme-seg button').forEach(function(btn){
  btn.addEventListener('click', function(){
    applyTheme(btn.getAttribute('data-tv'));
  });
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
  if(currentThemeMode === 'system') applyTheme('system');
});

try{var savedTheme = localStorage.getItem('theme'); applyTheme(savedTheme || 'system')}catch(e){applyTheme('system')}

/* ══════════════════════════════════════════════════════════════════
   USER COMBO-BOX (shows all users on focus)
   ══════════════════════════════════════════════════════════════════ */

try{var savedUser=localStorage.getItem('userId');if(savedUser)$userId.value=savedUser}catch(e){}

function selectUser(u){
  $userId.value = u;
  $userDropdown.classList.remove('open');
  try{localStorage.setItem('userId', u)}catch(ex){}
  activeTagFilter = null;
  startNewChat();
  loadChatList();
}

function renderUserDropdown(showAll){
  $userDropdown.innerHTML='';
  var current = getUser();
  var filter = showAll ? '' : ($userId.value||'').trim().toLowerCase();
  var filtered = allUsers.filter(function(u){
    return !filter || u.toLowerCase().indexOf(filter) >= 0;
  });
  if(!filtered.length && filter && allUsers.length){
    var hint = document.createElement('div');
    hint.className = 'user-dropdown-item';
    hint.style.color = 'var(--text-faint)';
    hint.textContent = 'Press Enter to create "' + filter + '"';
    $userDropdown.appendChild(hint);
    return;
  }
  filtered.forEach(function(u){
    var item = document.createElement('div');
    item.className = 'user-dropdown-item' + (u === current ? ' active' : '');
    item.textContent = u;
    item.addEventListener('mousedown', function(e){
      e.preventDefault();
      e.stopPropagation();
      selectUser(u);
    });
    $userDropdown.appendChild(item);
  });
}

var _usersLoaded = false;
$userId.addEventListener('focus', function(){
  if(_usersLoaded && allUsers.length){
    renderUserDropdown(true);
    $userDropdown.classList.add('open');
  } else {
    loadUsers().then(function(){
      _usersLoaded = true;
      renderUserDropdown(true);
      $userDropdown.classList.add('open');
    });
  }
});
$userId.addEventListener('blur', function(){
  setTimeout(function(){$userDropdown.classList.remove('open')}, 200);
});
$userId.addEventListener('input', function(){
  renderUserDropdown();
  if(allUsers.length) $userDropdown.classList.add('open');
});
$userId.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    $userDropdown.classList.remove('open');
    $userId.blur();
    try{localStorage.setItem('userId', $userId.value.trim())}catch(ex){}
    activeTagFilter = null;
    _usersLoaded = false;
    startNewChat();
    loadChatList();
    loadUsers();
  }
});

/* ══════════════════════════════════════════════════════════════════
   MODE & TAB SWITCHING
   ══════════════════════════════════════════════════════════════════ */

var isAdminMode = false;
var $tabChat = document.getElementById('tabChat');
var $tabAdmin = document.getElementById('tabAdmin');
var $tabMemory = document.getElementById('tabMemory');
var $adminModeBtn = document.getElementById('adminModeBtn');
var $adminSidebar = document.getElementById('adminSidebar');
var $sbUser = document.querySelector('.sb-user');
var $sbActions = document.querySelector('.sb-actions');
var $sbSearch = document.querySelector('.sb-search');
var $sbChats = document.getElementById('chatList');
var $sbSections = document.querySelectorAll('.sb-section');
var $recToggles = document.getElementById('recToggles');

function setMode(admin){
  isAdminMode = admin;
  $tabChat.style.display = admin ? 'none' : '';
  $tabAdmin.style.display = admin ? '' : 'none';
  $tabMemory.style.display = admin ? '' : 'none';
  $adminModeBtn.textContent = admin ? '\u2190 Back to Chat' : '\u2699 Admin';
  $adminModeBtn.classList.toggle('active', admin);

  $sbUser.style.display = admin ? 'none' : '';
  $sbActions.style.display = admin ? 'none' : '';
  $sbSearch.style.display = admin ? 'none' : '';
  $sbChats.style.display = admin ? 'none' : '';
  $tagFilter.style.display = admin ? 'none' : '';
  $sbSections.forEach(function(s){s.style.display = admin ? 'none' : ''});
  $recToggles.style.display = admin ? 'none' : '';
  $adminSidebar.style.display = admin ? '' : 'none';

  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});

  if(admin){
    $tabAdmin.classList.add('active');
    document.getElementById('adminTab').classList.add('active');
    $exportBtn.style.display = 'none';
    loadAdmin();
    loadAdminSidebar();
  } else {
    $tabChat.classList.add('active');
    document.getElementById('chatTab').classList.add('active');
    $exportBtn.style.display = '';
  }
}

$adminModeBtn.addEventListener('click', function(){ setMode(!isAdminMode) });

function updateExportVisibility(tab){
  $exportBtn.style.display = (tab === 'chat') ? '' : 'none';
}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
    btn.classList.add('active');
    var tab = btn.dataset.tab;
    document.getElementById(tab+'Tab').classList.add('active');
    updateExportVisibility(tab);
    if(tab==='admin') loadAdmin();
    if(tab==='memory') loadMemory();
  });
});

updateExportVisibility('chat');

/* ── Sidebar panels ── */
document.getElementById('tagToggle').addEventListener('click',function(){
  var arrow=document.getElementById('tagsArrow');
  arrow.classList.toggle('open');
  $tagsPanel.classList.toggle('open');
  if($tagsPanel.classList.contains('open')) renderTagPanel();
});

/* ── Recommendation toggles ── */
var $autoRecToggle = document.getElementById('autoRecToggle');
var $pastSessionsToggle = document.getElementById('pastSessionsToggle');
$autoRecToggle.checked = autoRecEnabled;
$pastSessionsToggle.checked = usePastSessions;
$autoRecToggle.addEventListener('change', function(){
  autoRecEnabled = this.checked;
  localStorage.setItem('autoRec', autoRecEnabled);
});
$pastSessionsToggle.addEventListener('change', function(){
  usePastSessions = this.checked;
  localStorage.setItem('pastSessions', usePastSessions);
});
var $qualityScoringToggle = document.getElementById('qualityScoringToggle');
$qualityScoringToggle.checked = qualityScoringEnabled;
$qualityScoringToggle.addEventListener('change', function(){
  qualityScoringEnabled = this.checked;
  localStorage.setItem('qualityScoring', qualityScoringEnabled);
});

/* ── Export ── */
$exportBtn.addEventListener('click',function(){
  if(!chatMessages.length){alert('No messages to export.');return}
  var lines=['# Conversation Export\n'];
  chatMessages.forEach(function(m){
    lines.push((m.role==='user'?'**User**: ':'**Agent**: ')+m.content+'\n');
  });
  var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='conversation.md';a.click();
});

/* ══════════════════════════════════════════════════════════════════
   WELCOME SCREEN
   ══════════════════════════════════════════════════════════════════ */

function showWelcome(){
  $messages.innerHTML='';
  var w=document.createElement('div');
  w.className='welcome';
  w.id='welcomeScreen';
  w.innerHTML='<h2>What would you like to know?</h2>'
    +'<p>Ask about categories, intents, distributions, examples, or anything in the customer service dataset.</p>';
  var chips=document.createElement('div');
  chips.className='chips';
  SUGGESTIONS.forEach(function(s){
    var c=document.createElement('div');
    c.className='chip';
    c.textContent=s.label;
    c.addEventListener('click',function(){$queryInput.value=s.query;sendQuery()});
    chips.appendChild(c);
  });
  w.appendChild(chips);
  $messages.appendChild(w);
}

function showSuggestionChips(recommendations){
  var old=document.getElementById('suggestionsRow');
  if(old)old.remove();
  var row=document.createElement('div');
  row.id='suggestionsRow';
  row.className='chips';
  row.style.padding='4px 0 8px';

  if(recommendations && recommendations.length){
    recommendations.forEach(function(r){
      var c=document.createElement('div');
      c.className='chip rec';
      c.textContent=r.query.length>60 ? r.query.substring(0,57)+'...' : r.query;
      if(r.reason) c.title=r.reason;
      c.addEventListener('click',function(){$queryInput.value=r.query;sendQuery()});
      row.appendChild(c);
    });
  } else {
    var picks=SUGGESTIONS.slice(0,3);
    picks.forEach(function(s){
      var c=document.createElement('div');
      c.className='chip';
      c.textContent=s.label;
      c.addEventListener('click',function(){$queryInput.value=s.query;sendQuery()});
      row.appendChild(c);
    });
  }

  $messages.appendChild(row);
  scrollBottom();
}

async function fetchRecommendations(){
  showSuggestionChips();
  try{
    var url=API+'/api/recommend?user_id='+encodeURIComponent(getUser())
      +'&use_past_sessions='+usePastSessions;
    if(activeThread) url+='&session_id='+encodeURIComponent(activeThread);
    var resp=await fetch(url);
    var data=await resp.json();
    if(data.recommendations && data.recommendations.length){
      showSuggestionChips(data.recommendations);
    }
  }catch(e){
    console.warn('Recommendation fetch failed:',e);
  }
}

/* ══════════════════════════════════════════════════════════════════
   NEW CHAT
   ══════════════════════════════════════════════════════════════════ */

function startNewChat(){
  activeThread=makeId();
  chatMessages=[];
  showWelcome();
  renderChatList();
  renderTagPanel();
  $queryInput.value='';
  $sendBtn.disabled=false;
  $queryInput.focus();
}
document.getElementById('btnNew').addEventListener('click',startNewChat);

/* ══════════════════════════════════════════════════════════════════
   CHAT LIST
   ══════════════════════════════════════════════════════════════════ */

async function loadChatList(){
  try{
    var url=API+'/api/chats?user_id='+encodeURIComponent(getUser());
    if(activeTagFilter) url+='&tag='+encodeURIComponent(activeTagFilter);
    var r=await fetch(url);
    allChats=await r.json();
  }catch(e){allChats=[];}
  renderChatList();
  await loadAllTags();
}

function renderChatList(){
  var search=($search.value||'').toLowerCase();
  var filtered=allChats.filter(function(c){return !search||c.title.toLowerCase().indexOf(search)>=0});
  if(!filtered.length){
    $chatList.innerHTML='<div style="padding:12px 16px;font-size:12px;color:var(--text-faint)">'
      +(allChats.length?'No matches':'No conversations yet')+'</div>';
    return;
  }
  $chatList.innerHTML='';
  filtered.forEach(function(c){
    var item=document.createElement('div');
    item.className='chat-item'+(c.thread_id===activeThread?' active':'');
    var title=document.createElement('div');
    title.className='ci-title';
    title.textContent=(c.thread_id===activeThread?'\u25B6 ':'')+c.title;
    item.appendChild(title);

    var actions=document.createElement('div');
    actions.className='ci-actions';
    var expBtn=document.createElement('button');
    expBtn.className='ci-act';
    expBtn.title='Export this chat';
    expBtn.textContent='\u2913';
    (function(tid,ttl){expBtn.addEventListener('click',function(e){e.stopPropagation();exportSingleChat(tid,ttl)})})(c.thread_id,c.title);
    actions.appendChild(expBtn);
    var delBtn=document.createElement('button');
    delBtn.className='ci-act del';
    delBtn.title='Delete this chat';
    delBtn.textContent='\u2715';
    (function(tid){delBtn.addEventListener('click',function(e){e.stopPropagation();if(confirm('Delete this chat?'))deleteSingleChat(tid)})})(c.thread_id);
    actions.appendChild(delBtn);
    item.appendChild(actions);

    if(c.tags&&c.tags.length){
      var tagsEl=document.createElement('div');
      tagsEl.className='ci-tags';
      c.tags.forEach(function(t){
        var pill=document.createElement('span');
        pill.className='ci-tag';
        pill.textContent=t;
        tagsEl.appendChild(pill);
      });
      item.appendChild(tagsEl);
    }
    var meta=document.createElement('div');
    meta.className='ci-meta';
    meta.textContent=(c.updated_at||'').substring(0,16)+' \u00b7 '+c.message_count+' msg';
    item.appendChild(meta);
    item.addEventListener('click',function(){switchToChat(c.thread_id)});
    $chatList.appendChild(item);
  });

  if(filtered.length > 1){
    var delAll=document.createElement('button');
    delAll.className='delete-all-user';
    delAll.textContent='\u2715 Delete all my chats';
    delAll.addEventListener('click',function(){
      if(!confirm('Delete all your chats? This cannot be undone.'))return;
      deleteUserChats();
    });
    $chatList.appendChild(delAll);
  }
}

async function exportSingleChat(threadId,title){
  try{
    var r=await fetch(API+'/api/chats/'+threadId);
    var data=await r.json();
    var lines=['# '+esc(title||'Chat Export')+'\n'];
    (data.messages||[]).forEach(function(m){
      lines.push((m.role==='user'?'**User**: ':'**Agent**: ')+m.content+'\n');
    });
    var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(title||'chat').replace(/[^a-z0-9]/gi,'_')+'.md';a.click();
  }catch(e){alert('Export failed.')}
}

async function deleteUserChats(){
  await fetch(API+'/api/chats?user_id='+encodeURIComponent(getUser()),{method:'DELETE'});
  startNewChat();
  await loadChatList();
}

$search.addEventListener('input',renderChatList);

/* ══════════════════════════════════════════════════════════════════
   TAG FILTER (above chat list)
   ══════════════════════════════════════════════════════════════════ */

async function loadAllTags(){
  try{
    var r=await fetch(API+'/api/tags?user_id='+encodeURIComponent(getUser()));
    var d=await r.json();
    allTags=d.tags||[];
  }catch(e){allTags=[];}
  renderTagFilter();
}

function renderTagFilter(){
  if(!allTags.length){$tagFilter.innerHTML='';return}
  var wrap=document.createElement('div');
  wrap.className='sb-tag-filter';
  allTags.forEach(function(tag){
    var pill=document.createElement('span');
    pill.className='tag-pill'+(activeTagFilter===tag?' active':'');
    pill.textContent=tag;
    pill.addEventListener('click',function(){
      if(activeTagFilter===tag){activeTagFilter=null}
      else{activeTagFilter=tag}
      loadChatList();
    });
    wrap.appendChild(pill);
  });
  $tagFilter.innerHTML='';
  $tagFilter.appendChild(wrap);
}

/* ══════════════════════════════════════════════════════════════════
   SWITCH TO EXISTING CHAT
   ══════════════════════════════════════════════════════════════════ */

async function switchToChat(threadId){
  activeThread=threadId;
  chatMessages=[];
  renderChatList();
  try{
    var r=await fetch(API+'/api/chats/'+threadId);
    var data=await r.json();
    chatMessages=data.messages||[];
    renderLoadedMessages(data.queries||[]);
  }catch(e){
    $messages.innerHTML='<div style="padding:20px;color:var(--red)">Failed to load chat.</div>';
  }
  renderTagPanel();
}

function renderLoadedMessages(queries){
  $messages.innerHTML='';
  var qIdx = 0;
  chatMessages.forEach(function(m){
    if(m.role==='user'){
      appendUserBubble(m.content);
    } else {
      var q = queries[qIdx] || null;
      if(q) qIdx++;
      var answerLike = q ? {
        query_type: q.query_type,
        tokens: q.tokens,
        duration_ms: q.total_duration_ms,
        tool_count: (q.tool_calls||[]).length,
        memory_ops: q.memory_ops || {}
      } : null;
      var bEl=appendBotBubble(m.content, q?q.tool_calls:[], answerLike);
      if(q && q.quality_score && q.quality_score.overall) renderJudgeCard(q.quality_score, bEl);
    }
  });
  if(autoRecEnabled && chatMessages.length > 0){
    fetchRecommendations();
  } else {
    showSuggestionChips();
  }
  scrollBottom();
}

/* ══════════════════════════════════════════════════════════════════
   SEND QUERY (SSE)
   ══════════════════════════════════════════════════════════════════ */

$queryInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey)sendQuery()});
$sendBtn.addEventListener('click',sendQuery);

async function sendQuery(){
  if(isSending)return;
  var q=$queryInput.value.trim();
  if(!q)return;

  isSending=true;
  $queryInput.value='';
  $sendBtn.disabled=true;

  var welcome=document.getElementById('welcomeScreen');
  if(welcome)welcome.remove();
  var oldSug=document.getElementById('suggestionsRow');
  if(oldSug)oldSug.remove();

  appendUserBubble(q);
  chatMessages.push({role:'user',content:q});

  var typingEl=showTyping();
  scrollBottom();

  var steps=[];
  var finalText='';
  var answerData=null;
  var qualityData=null;
  var liveStepsEl=null;

  try{
    var resp=await fetch(API+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:q,session_id:activeThread,user_id:getUser(),use_past_sessions:usePastSessions,quality_scoring:qualityScoringEnabled})
    });

    var reader=resp.body.getReader();
    var decoder=new TextDecoder();
    var buffer='';
    var eventType=null;

    while(true){
      var chunk=await reader.read();
      if(chunk.done)break;
      buffer+=decoder.decode(chunk.value,{stream:true});
      var lines=buffer.split('\n');
      buffer=lines.pop();
      for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.startsWith('event: ')){eventType=line.substring(7).trim();continue}
        if(line.startsWith('data: ')&&eventType){
          try{
            var d=JSON.parse(line.substring(6));
            if(eventType==='route'){steps.push({type:'route',query_type:d.query_type})}
            else if(eventType==='tool_call'){steps.push({type:'tool_call',name:d.name,args:d.args})}
            else if(eventType==='tool_result'){steps.push({type:'tool_result',name:d.name,content:d.content})}
            else if(eventType==='answer'){answerData=d;finalText=d.text}
            else if(eventType==='quality'){qualityData=d}
            else if(eventType==='error'){finalText='Error: '+d.message}
            if(eventType!=='answer'){
              liveStepsEl=updateLiveSteps(liveStepsEl,steps);
              scrollBottom();
            }
          }catch(e){}
          eventType=null;
        }
      }
    }
  }catch(e){
    finalText='Connection error. Please try again.';
  }

  if(typingEl)typingEl.remove();
  if(liveStepsEl)liveStepsEl.remove();

  var botEl=appendBotBubble(finalText,steps,answerData);
  if(qualityData) renderJudgeCard(qualityData, botEl);
  chatMessages.push({role:'assistant',content:finalText});

  scrollBottom();
  isSending=false;
  $sendBtn.disabled=false;
  $queryInput.focus();

  if(autoRecEnabled){
    fetchRecommendations();
  } else {
    showSuggestionChips();
  }
  await loadChatList();
  renderTagPanel();
  refreshMeta();
}

/* ── Message rendering helpers ── */

function appendUserBubble(text){
  var el=document.createElement('div');
  el.className='msg user';
  el.textContent=text;
  $messages.appendChild(el);
  scrollBottom();
}

function getMemoryBadges(steps, memOps){
  var mo = memOps || {};
  var ctxLabel = mo.context_messages ? ' ('+mo.context_messages+' msg)' : '';
  var badges=[
    {type:'working', label:'Working'+ctxLabel},
    {type:'episodic', label:'Episodic'}
  ];
  var toolCalls=(steps||[]).filter(function(s){return s.type==='tool_call'});
  if(toolCalls.length){
    badges.push({type:'procedural',label:'Procedural: '+toolCalls.length+' tool'+(toolCalls.length>1?'s':'')});
  }
  var semTools = (mo.semantic_tools && mo.semantic_tools.length) ? mo.semantic_tools : [];
  var semFromSteps = toolCalls.filter(function(s){return s.name==='remember_fact'||s.name==='recall_profile'});
  if(semTools.length){
    var ops = semTools.map(function(n){return n==='remember_fact'?'write':'read'});
    badges.push({type:'semantic',label:'Semantic: '+ops.join(', ')});
  } else if(semFromSteps.length){
    var ops = semFromSteps.map(function(s){return s.name==='remember_fact'?'write':'read'});
    badges.push({type:'semantic',label:'Semantic: '+ops.join(', ')});
  }
  return badges;
}

function appendBotBubble(text,steps,answerData){
  var el=document.createElement('div');
  el.className='msg bot';

  var content=document.createElement('span');
  content.textContent=text||'No response.';
  el.appendChild(content);

  if(steps&&steps.length){
    var togId='r'+makeId();
    var toggle=document.createElement('div');
    toggle.className='reasoning-toggle';
    toggle.textContent='Show reasoning ('+steps.length+' steps)';

    var reasoningBox=document.createElement('div');
    reasoningBox.className='reasoning-content';
    reasoningBox.id=togId;

    steps.forEach(function(s){
      var stepEl=document.createElement('div');
      stepEl.className='step';
      if(s.type==='route'){stepEl.classList.add('route');stepEl.textContent='Route: '+(s.query_type||'')}
      else if(s.type==='tool_call'){stepEl.classList.add('tool');stepEl.textContent=s.name+'('+JSON.stringify(s.args||{})+')'}
      else if(s.type==='tool_result'){stepEl.classList.add('result');stepEl.textContent=(s.content||'').substring(0,200)}
      reasoningBox.appendChild(stepEl);
    });

    toggle.addEventListener('click',function(){
      reasoningBox.classList.toggle('open');
      toggle.textContent=(reasoningBox.classList.contains('open')?'Hide':'Show')+' reasoning ('+steps.length+' steps)';
    });
    el.appendChild(toggle);
    el.appendChild(reasoningBox);
  }

  var memOps = answerData ? (answerData.memory_ops || {}) : {};
  var badges=getMemoryBadges(steps, memOps);
  if(badges.length){
    var traceEl=document.createElement('div');
    traceEl.className='memory-trace';
    badges.forEach(function(b){
      var badge=document.createElement('span');
      badge.className='mt-badge '+b.type;
      badge.textContent=b.label;
      traceEl.appendChild(badge);
    });
    el.appendChild(traceEl);
  }

  if(answerData){
    var footer=document.createElement('div');
    footer.className='msg-footer';
    var badge={structured:'struct',unstructured:'open',out_of_scope:'oos'}[answerData.query_type]||'';
    var tok=(answerData.tokens||{}).total||0;
    var dur=answerData.duration_ms||0;
    var tc=answerData.tool_count||0;
    footer.textContent=badge+' \u00b7 '+tok.toLocaleString()+' tok \u00b7 '+(dur/1000).toFixed(1)+'s \u00b7 '+tc+' calls';
    el.appendChild(footer);
  }

  $messages.appendChild(el);
  return el;
}

function showTyping(){
  var el=document.createElement('div');
  el.className='typing-indicator visible';
  el.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="typing-label">Thinking...</span>';
  $messages.appendChild(el);
  return el;
}

function updateLiveSteps(existing,steps){
  if(!existing){
    existing=document.createElement('div');
    existing.className='msg bot';
    existing.style.opacity='0.7';
    $messages.appendChild(existing);
  }
  existing.innerHTML='';
  steps.forEach(function(s){
    var stepEl=document.createElement('div');
    stepEl.className='step';
    if(s.type==='route'){stepEl.classList.add('route');stepEl.textContent='Route: '+(s.query_type||'')}
    else if(s.type==='tool_call'){stepEl.classList.add('tool');stepEl.textContent=s.name+'('+JSON.stringify(s.args||{})+')'}
    else if(s.type==='tool_result'){stepEl.classList.add('result');stepEl.textContent=(s.content||'').substring(0,200)}
    existing.appendChild(stepEl);
  });
  return existing;
}

/* ══════════════════════════════════════════════════════════════════
   TAG PANEL (per-chat tag management)
   ══════════════════════════════════════════════════════════════════ */

function renderTagPanel(){
  if(!activeThread){
    $tagsPanel.innerHTML='<div style="font-size:12px;color:var(--text-faint)">Start a chat to manage tags</div>';
    return;
  }
  var chat=allChats.find(function(c){return c.thread_id===activeThread});
  var tags=chat?chat.tags:[];

  $tagsPanel.innerHTML='';

  if(tags.length){
    var row=document.createElement('div');
    row.className='tag-mgmt-row';
    tags.forEach(function(t){
      var pill=document.createElement('span');
      pill.className='tag-rm';
      pill.innerHTML=esc(t)+'<span class="x">\u00d7</span>';
      pill.querySelector('.x').addEventListener('click',function(){removeTagFromChat(t)});
      row.appendChild(pill);
    });
    $tagsPanel.appendChild(row);
  } else {
    var empty=document.createElement('div');
    empty.style.cssText='font-size:11px;color:var(--text-faint);margin-bottom:4px';
    empty.textContent='No tags on this chat';
    $tagsPanel.appendChild(empty);
  }

  var addRow=document.createElement('div');
  addRow.className='tag-add';
  var inp=document.createElement('input');
  inp.placeholder='Add tag...';
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')doAddTag()});
  var btn=document.createElement('button');
  btn.textContent='+';
  btn.addEventListener('click',doAddTag);
  addRow.appendChild(inp);
  addRow.appendChild(btn);
  $tagsPanel.appendChild(addRow);

  function doAddTag(){
    var tag=inp.value.trim().toLowerCase();
    if(!tag)return;
    addTagToChat(tag);
    inp.value='';
  }
}

async function addTagToChat(tag){
  if(!activeThread)return;
  await fetch(API+'/api/chats/'+activeThread+'/tags',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tag:tag})
  });
  await loadChatList();
  renderTagPanel();
}

async function removeTagFromChat(tag){
  if(!activeThread)return;
  await fetch(API+'/api/chats/'+activeThread+'/tags/'+encodeURIComponent(tag),{method:'DELETE'});
  await loadChatList();
  renderTagPanel();
}

/* ══════════════════════════════════════════════════════════════════
   ADMIN TAB (with session ID in header)
   ══════════════════════════════════════════════════════════════════ */

async function loadAdmin(){
  $adminContent.innerHTML='';
  var heading=document.createElement('div');
  heading.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:12px';
  heading.innerHTML='<h3 style="margin:0;font-size:16px;font-weight:600">Chat Tracing</h3>';
  $adminContent.appendChild(heading);

  var cleanup=document.createElement('div');
  cleanup.className='admin-cleanup';
  var btnCleanAll=document.createElement('button');
  btnCleanAll.textContent='\u2715 Clean All Chats';
  btnCleanAll.addEventListener('click',function(){
    if(!confirm('Delete ALL chat sessions and checkpoint data? User profiles will be preserved. This cannot be undone.'))return;
    deleteAllChats();
  });
  cleanup.appendChild(btnCleanAll);
  $adminContent.appendChild(cleanup);

  try{
    var r=await fetch(API+'/api/chats?all_users=true');
    var chats=await r.json();
    if(!chats.length){
      $adminContent.innerHTML+='<div class="admin-empty">No sessions recorded yet. Start a conversation in the Chat tab.</div>';
      return;
    }
    for(var i=0;i<chats.length;i++){
      var chat=chats[i];
      var cr=await fetch(API+'/api/chats/'+chat.thread_id);
      var detail=await cr.json();
      var queries=detail.queries||[];
      var hasFallback=queries.some(function(q){return q.hit_fallback});
      var cardId='ac_'+chat.thread_id.replace(/[^a-z0-9]/gi,'');

      var card=document.createElement('div');
      card.className='admin-card';

      var header=document.createElement('div');
      header.className='admin-card-header';
      header.innerHTML='<span class="arrow" id="'+cardId+'_a">&#9654;</span>'
        +(hasFallback?'&#9888;':'&#9989;')
        +' <span class="session-id">'+esc(chat.thread_id)+'</span> '
        +'<span class="admin-user-badge">'+esc(chat.user_id||'default')+'</span> '
        +esc(chat.title)
        +' &mdash; '+(chat.updated_at||'').substring(0,16)
        +' &middot; '+chat.query_count+' queries &middot; '+(chat.total_tokens||0).toLocaleString()+' tok';

      var delBtn=document.createElement('button');
      delBtn.className='admin-del-btn';
      delBtn.textContent='\u2715';
      delBtn.title='Delete this chat';
      (function(tid){
        delBtn.addEventListener('click',function(e){
          e.stopPropagation();
          if(!confirm('Delete this chat and its traces?'))return;
          deleteSingleChat(tid);
        });
      })(chat.thread_id);
      header.appendChild(delBtn);

      var body=document.createElement('div');
      body.className='admin-card-body';
      body.id=cardId+'_b';

      var info=document.createElement('div');
      info.style.cssText='color:var(--text-faint);margin-bottom:6px';
      info.innerHTML='User: '+esc(chat.user_id||'default');
      body.appendChild(info);

      if(chat.tags&&chat.tags.length){
        var tagRow=document.createElement('div');
        tagRow.className='tag-mgmt-row';
        tagRow.style.marginBottom='6px';
        chat.tags.forEach(function(t){
          var pill=document.createElement('span');
          pill.className='tag-rm';
          pill.innerHTML=esc(t)+'<span class="x">\u00d7</span>';
          (function(tid,tag){
            pill.querySelector('.x').addEventListener('click',function(){
              removeTagAdmin(tid,tag);
            });
          })(chat.thread_id,t);
          tagRow.appendChild(pill);
        });
        body.appendChild(tagRow);
      }

      var addDiv=document.createElement('div');
      addDiv.className='tag-add';
      addDiv.style.marginBottom='8px';
      var tagInp=document.createElement('input');
      tagInp.placeholder='Add tag...';
      var tagBtn=document.createElement('button');
      tagBtn.textContent='+';
      (function(tid,inpRef){
        tagInp.addEventListener('keydown',function(e){if(e.key==='Enter'){addTagAdmin(tid,inpRef)}});
        tagBtn.addEventListener('click',function(){addTagAdmin(tid,inpRef)});
      })(chat.thread_id,tagInp);
      addDiv.appendChild(tagInp);
      addDiv.appendChild(tagBtn);
      body.appendChild(addDiv);

      var hr=document.createElement('hr');
      hr.style.cssText='border:none;border-top:1px solid var(--border);margin:6px 0';
      body.appendChild(hr);

      queries.forEach(function(q){
        var qRow=document.createElement('div');
        qRow.className='q-row';
        var preview=q.user_message.length>60?q.user_message.substring(0,60)+'...':q.user_message;
        var qh=document.createElement('div');
        qh.className='q-header';
        qh.innerHTML=(q.hit_fallback?'&#9888;':'&#9989;')+' Q'+(q.query_index+1)+': &ldquo;'+esc(preview)+'&rdquo; ('+esc(q.query_type)+') &mdash; '+q.total_duration_ms+'ms &middot; '+(q.tokens.total||0)+' tok';
        qRow.appendChild(qh);
        if(q.tool_calls){
          q.tool_calls.forEach(function(tc){
            var t=document.createElement('div');
            t.className='q-tool';
            t.textContent='\u2192 '+(tc.name||'?')+'('+JSON.stringify(tc.args||{})+')';
            qRow.appendChild(t);
          });
        }
        if(q.final_response_preview){
          var resp=document.createElement('div');
          resp.className='q-response';
          resp.textContent='Response: '+q.final_response_preview;
          qRow.appendChild(resp);
        }
        if(q.quality_score && q.quality_score.overall){
          var qs=q.quality_score;
          var qj=document.createElement('div');
          qj.className='q-judge'+(qs.overall<3?' low':'');
          qj.textContent='\u2696\uFE0F '+qs.overall+'/5 (G:'+qs.data_grounded+' R:'+qs.addresses_question+' C:'+qs.conciseness+') \u00b7 '
            +(qs.judge_tokens?qs.judge_tokens.total:0)+' tok \u00b7 '+qs.judge_duration_ms+'ms';
          qRow.appendChild(qj);
          if(qs.issue){
            var qi=document.createElement('div');
            qi.className='q-judge-issue';
            qi.textContent=qs.issue;
            qRow.appendChild(qi);
          }
        }
        body.appendChild(qRow);
      });

      (function(hdr,bdy,arrowId){
        hdr.addEventListener('click',function(e){
          if(e.target.classList.contains('admin-del-btn'))return;
          bdy.classList.toggle('open');
          var a=document.getElementById(arrowId);
          if(a) a.classList.toggle('open');
        });
      })(header,body,cardId+'_a');

      card.appendChild(header);
      card.appendChild(body);
      $adminContent.appendChild(card);
    }
  }catch(e){
    $adminContent.innerHTML+='<div class="admin-empty">Error loading sessions.</div>';
  }
}

    $adminSidebar.appendChild(c3);

    var c4=document.createElement('div');c4.className='stat-card';
    c4.innerHTML='<div class="stat-label">Queries</div><div class="stat-val">'+d.total_queries+'</div>';
    $adminSidebar.appendChild(c4);

      c5.innerHTML='<div class="stat-label">\u2696\uFE0F Scored</div><div class="stat-val">'+d.quality.scored+' of '+d.quality.total+'</div>'

        +'<div class="su">\u25CF Low (&lt;3): '+d.quality.low+'</div>'
        +'</div>';

    }

    if(d.costs){
      var c6=document.createElement('div');c6.className='stat-card';
      c6.innerHTML='<div class="stat-label">\uD83D\uDCB0 Costs</div>'
        +'<div class="stat-detail">'
        +'<div class="su">Agent: $'+d.costs.agent.toFixed(4)+'</div>'
        +(d.costs.judge>0?'<div class="su">Judge: $'+d.costs.judge.toFixed(4)+'</div>':'')
        +'</div>';
      $adminSidebar.appendChild(c6);
    }
  }catch(e){
    $adminSidebar.innerHTML='<div style="padding:12px;font-size:12px;color:var(--text-faint)">Stats unavailable</div>';
  }

   MEMORY INSIGHTS TAB
   ══════════════════════════════════════════════════════════════════ */

async function loadMemory(){
  $memoryContent.innerHTML='<h3>Memory Insights <button class="mem-refresh" id="memRefreshBtn">Refresh</button></h3>';
  document.getElementById('memRefreshBtn').addEventListener('click', loadMemory);

  try{
    var url=API+'/api/memory';
    if(activeThread) url+='?session_id='+encodeURIComponent(activeThread);
    var r=await fetch(url);
    var data=await r.json();

    var grid=document.createElement('div');
    grid.className='memory-grid';
    grid.appendChild(buildWorkingPanel(data.working));
    grid.appendChild(buildEpisodicPanel(data.episodic));
    grid.appendChild(buildSemanticPanel(data.semantic));
    grid.appendChild(buildProceduralPanel(data.procedural));
    $memoryContent.appendChild(grid);
  }catch(e){
    $memoryContent.innerHTML+='<div class="admin-empty">Failed to load memory data.</div>';
  }
}

function buildWorkingPanel(w){
  var panel=document.createElement('div');
  panel.className='memory-panel';
  var header=document.createElement('div');
  header.className='mp-header';
  header.innerHTML='<div class="mp-icon" style="background:var(--mt-working-bg);color:var(--mt-working-fg)">\u26A1</div>'
    +'<div class="mp-info"><div class="mp-title">Working Memory</div><div class="mp-sub">Current session context</div></div>'
    +'<div class="mp-kpi">'+(w.message_count||0)+' msg</div>';
  panel.appendChild(header);

  var body=document.createElement('div');
  body.className='mp-body';
  if(!w.message_count){
    body.innerHTML='<div class="mp-empty">Start a chat to see working memory</div>';
  } else {
    body.innerHTML=
      '<div class="mp-row"><span class="mp-label">User messages</span><span class="mp-val">'+w.user_msgs+'</span></div>'
      +'<div class="mp-row"><span class="mp-label">Assistant messages</span><span class="mp-val">'+w.assistant_msgs+'</span></div>'
      +'<div class="mp-row"><span class="mp-label">Tool messages</span><span class="mp-val">'+w.tool_msgs+'</span></div>'
      +'<div class="mp-row"><span class="mp-label">Est. tokens</span><span class="mp-val">~'+(w.estimated_tokens||0).toLocaleString()+'</span></div>';
  }
  panel.appendChild(body);
  return panel;
}

function buildEpisodicPanel(ep){
  var panel=document.createElement('div');
  panel.className='memory-panel';
  var header=document.createElement('div');
  header.className='mp-header';
  header.innerHTML='<div class="mp-icon" style="background:var(--mt-episodic-bg);color:var(--mt-episodic-fg)">\uD83D\uDCC5</div>'
    +'<div class="mp-info"><div class="mp-title">Conversation Records</div><div class="mp-sub">Chat history across all users</div></div>'
    +'<div class="mp-kpi">'+ep.total_sessions+' sessions</div>';
  panel.appendChild(header);

  var body=document.createElement('div');
  body.className='mp-body';
  body.innerHTML=
    '<div class="mp-row"><span class="mp-label">Total messages</span><span class="mp-val">'+ep.total_messages+'</span></div>'
    +'<div class="mp-row"><span class="mp-label">Avg depth</span><span class="mp-val">'+ep.avg_depth+' msg/session</span></div>';

  if(ep.sessions&&ep.sessions.length){
    var title=document.createElement('div');
    title.className='mp-section-title';
    title.textContent='Recent Sessions';
    body.appendChild(title);

    var list=document.createElement('div');
    list.className='mp-list';
    ep.sessions.slice(0,8).forEach(function(s){
      var item=document.createElement('div');
      item.className='mp-list-item';
      item.innerHTML='<span class="li-title">'+esc(s.title)+'</span>'
        +'<span class="li-meta">'+s.message_count+' msg &middot; '+(s.created_at||'').substring(0,10)+'</span>';
      list.appendChild(item);
    });
    body.appendChild(list);
  }
  panel.appendChild(body);
  return panel;
}

function buildSemanticPanel(sem){
  var panel=document.createElement('div');
  panel.className='memory-panel';
  var header=document.createElement('div');
  header.className='mp-header';
  header.innerHTML='<div class="mp-icon" style="background:var(--mt-semantic-bg);color:var(--mt-semantic-fg)">\uD83E\uDDE9</div>'
    +'<div class="mp-info"><div class="mp-title">User Profiles</div><div class="mp-sub">Stored facts &amp; preferences</div></div>'
    +'<div class="mp-kpi">'+sem.total_facts+' facts</div>';
  panel.appendChild(header);

  var body=document.createElement('div');
  body.className='mp-body';
  if(!sem.profiles||!sem.profiles.length){
    body.innerHTML='<div class="mp-empty">No user profiles yet. The agent remembers facts when you share them.</div>';
  } else {
    sem.profiles.forEach(function(p){
      var uTitle=document.createElement('div');
      uTitle.className='fact-user';
      uTitle.textContent=p.user_id+' ('+p.fact_count+' fact'+(p.fact_count!==1?'s':'')+')';
      body.appendChild(uTitle);
      if(p.facts&&p.facts.length){
        p.facts.forEach(function(f){
          var fEl=document.createElement('div');
          fEl.className='fact-item';
          fEl.textContent=f;
          body.appendChild(fEl);
        });
      }
    });
  }

  if(isAdminMode){
    var delRow=document.createElement('div');
    delRow.className='mp-delete-row';
    var sel=document.createElement('select');
    sel.innerHTML='<option value="">Select user to delete...</option><option value="__all__">All users</option>';
    var knownUsers=new Set();
    (sem.profiles||[]).forEach(function(p){knownUsers.add(p.user_id)});
    allUsers.forEach(function(u){knownUsers.add(u)});
    Array.from(knownUsers).sort().forEach(function(uid){
      var opt=document.createElement('option');
      opt.value=uid;
      opt.textContent=uid;
      sel.appendChild(opt);
    });
    var delBtn=document.createElement('button');
    delBtn.textContent='\u2715 Delete';
    delBtn.addEventListener('click',function(){
      var uid=sel.value;
      if(!uid){alert('Select a user first.');return}
      if(uid==='__all__'){
        if(!confirm('Delete ALL users?\n\nThis will remove:\n- All profiles and stored facts\n- All chat sessions\n- All checkpoint data\n\nThis cannot be undone.'))return;
        deleteAllUsers();
      } else {
        if(!confirm('Delete user "'+uid+'"?\n\nThis will remove:\n- Their profile and stored facts\n- All their chat sessions\n- All checkpoint data\n\nThis cannot be undone.'))return;
        deleteUser(uid);
      }
    });
    delRow.appendChild(sel);
    delRow.appendChild(delBtn);
    body.appendChild(delRow);
  }

  panel.appendChild(body);
  return panel;
}

function buildProceduralPanel(proc){
  var panel=document.createElement('div');
  panel.className='memory-panel';
  var header=document.createElement('div');
  header.className='mp-header';
  header.innerHTML='<div class="mp-icon" style="background:var(--mt-procedural-bg);color:var(--mt-procedural-fg)">\u2699\uFE0F</div>'
    +'<div class="mp-info"><div class="mp-title">Procedural Memory</div><div class="mp-sub">Tool usage &amp; patterns</div></div>'
    +'<div class="mp-kpi">'+proc.total_tool_calls+' calls</div>';
  panel.appendChild(header);

  var body=document.createElement('div');
  body.className='mp-body';
  var usage=proc.tool_usage||{};
  var toolNames=Object.keys(usage);
  if(!toolNames.length){
    body.innerHTML='<div class="mp-empty">No tool usage recorded yet.</div>';
  } else {
    var maxCount=Math.max.apply(null,toolNames.map(function(n){return usage[n]}));

    var title1=document.createElement('div');
    title1.className='mp-section-title';
    title1.textContent='Tool Usage';
    body.appendChild(title1);

    toolNames.forEach(function(name){
      var count=usage[name];
      var row=document.createElement('div');
      row.className='tool-bar-row';
      row.innerHTML='<span class="tool-bar-name">'+esc(name)+'</span>'
        +'<div class="tool-bar"><div class="tool-bar-fill" style="width:'+Math.round(count/maxCount*100)+'%"></div></div>'
        +'<span class="tool-bar-count">'+count+'</span>';
      body.appendChild(row);
    });

    var qtDist=proc.query_type_distribution||{};
    var qtKeys=Object.keys(qtDist);
    if(qtKeys.length){
      var title2=document.createElement('div');
      title2.className='mp-section-title';
      title2.textContent='Query Types';
      body.appendChild(title2);
      var distRow=document.createElement('div');
      distRow.className='qt-dist';
      var totalQt=qtKeys.reduce(function(s,k){return s+qtDist[k]},0);
      qtKeys.forEach(function(k){
        var pct=totalQt?Math.round(qtDist[k]/totalQt*100):0;
        var badge=document.createElement('span');
        badge.className='qt-badge';
        badge.textContent=k+': '+pct+'% ('+qtDist[k]+')';
        distRow.appendChild(badge);
      });
      body.appendChild(distRow);
    }
  }
  panel.appendChild(body);
  return panel;
}

/* ══════════════════════════════════════════════════════════════════
   JUDGE CARD (quality scoring)
   ══════════════════════════════════════════════════════════════════ */

function renderJudgeCard(qd, botEl){
  var card=document.createElement('div');
  card.className='judge-card collapsed';
  var passed=qd.passed;
  var icon=passed?'\u2705':'\u26A0\uFE0F';
  function dots(score){
    var s='';
    for(var i=1;i<=5;i++) s+=(i<=score?'\u25CF':'\u25CB');
    return s;
  }
  card.innerHTML=
    '<div class="judge-header">'
      +'<span class="judge-icon">\u2696\uFE0F</span>'
      +'<span class="judge-label">Judge ('+esc(qd.judge_model?qd.judge_model.split('/').pop():'')+')</span>'
      +'<span class="judge-score '+(passed?'pass':'fail')+'">'+qd.overall+'/5 '+icon+'</span>'
    +'</div>'
    +'<div class="judge-body">'
      +'<div class="judge-dims">'
        +'<span class="judge-dim"><span class="dim-label">Grounded</span><span class="dim-dots">'+dots(qd.data_grounded)+'</span></span>'
        +'<span class="judge-dim"><span class="dim-label">Relevant</span><span class="dim-dots">'+dots(qd.addresses_question)+'</span></span>'
        +'<span class="judge-dim"><span class="dim-label">Concise</span><span class="dim-dots">'+dots(qd.conciseness)+'</span></span>'
      +'</div>'
      +(qd.issue?'<div class="judge-issue">"'+esc(qd.issue)+'"</div>':'')
      +'<div class="judge-meta">'+(qd.judge_tokens?qd.judge_tokens.total||0:0)+' tok &middot; '
        +(qd.judge_duration_ms||0)+'ms</div>'
    +'</div>';
  card.addEventListener('click',function(e){e.stopPropagation();card.classList.toggle('collapsed')});

  if(botEl && botEl.parentNode === $messages){
    var wrapper=document.createElement('div');
    wrapper.className='msg-with-judge';
    $messages.insertBefore(wrapper, botEl);
    wrapper.appendChild(botEl);
    wrapper.appendChild(card);
  } else {
    $messages.appendChild(card);
  }
  scrollBottom();
}

/* ══════════════════════════════════════════════════════════════════
   STATUS BAR
   ══════════════════════════════════════════════════════════════════ */

var healthPopoverEl=null;

async function loadHealth(){
  try{
    var r=await fetch(API+'/api/health');
    var d=await r.json();
    var dot={healthy:'\uD83D\uDFE2',warning:'\uD83D\uDFE1',error:'\uD83D\uDD34',loading:'\u26AA'}[d.status]||'\u26AA';
    var label=d.status==='loading'?'Loading...':d.status.charAt(0).toUpperCase()+d.status.slice(1);
    $healthSeg.textContent=dot+' '+label;

    if(healthPopoverEl){healthPopoverEl.remove();healthPopoverEl=null}
    if(d.checks&&d.checks.length){
      healthPopoverEl=document.createElement('div');
      healthPopoverEl.className='health-popover';
      d.checks.forEach(function(c){
        var icon={pass:'\u2705',warn:'\u26A0\uFE0F',fail:'\u274C'}[c.status]||'';
        var row=document.createElement('div');
        row.className='hc';
        row.textContent=icon+' '+c.name+': '+c.status;
        healthPopoverEl.appendChild(row);
        var msg=document.createElement('div');
        msg.className='hc-msg';
        msg.textContent=c.message;
        healthPopoverEl.appendChild(msg);
      });
      var refreshBtn=document.createElement('button');
      refreshBtn.className='refresh-btn';
      refreshBtn.textContent='Refresh';
      refreshBtn.addEventListener('click',function(e){
        e.stopPropagation();
        fetch(API+'/api/health/refresh',{method:'POST'});
        $healthSeg.textContent='\u26AA Refreshing...';
        setTimeout(loadHealth,3000);
      });
      healthPopoverEl.appendChild(refreshBtn);
      $healthSeg.appendChild(healthPopoverEl);
    }

    if(d.status==='loading'){
      setTimeout(loadHealth,2000);
    }
  }catch(e){
    $healthSeg.textContent='\u26AA offline';
  }
}

$healthSeg.addEventListener('click',function(e){
  if(healthPopoverEl) healthPopoverEl.classList.toggle('open');
});
document.addEventListener('click',function(e){
  if(healthPopoverEl && !$healthSeg.contains(e.target)){
    healthPopoverEl.classList.remove('open');
  }
});

async function refreshMeta(){
  try{
    var r=await fetch(API+'/api/meta');
    var d=await r.json();
    $datasetSeg.textContent=d.dataset.row_count.toLocaleString()+' rows \u00b7 '+d.dataset.num_categories+'c \u00b7 '+d.dataset.num_intents+'i';

    var hasJudge=qualityScoringEnabled && d.judge && d.judge.tokens && d.judge.tokens.total>0;
    if(hasJudge){
      $tokenSeg.innerHTML='<span class="status-group">Agent: '+d.tokens.total.toLocaleString()+' tok \u00b7 ~$'+d.tokens.cost.toFixed(4)+' \u00b7 '+esc(d.model_short)+'</span>'
        +'<span class="status-group">\u2696\uFE0F Judge: '+d.judge.tokens.total.toLocaleString()+' tok \u00b7 ~$'+d.judge.cost.toFixed(4)+' \u00b7 '+esc(d.judge.model_short)+'</span>';
      $modelSeg.textContent='';
    } else {
      $tokenSeg.textContent=d.tokens.total.toLocaleString()+' tok \u00b7 ~$'+d.tokens.cost.toFixed(4);
      $modelSeg.textContent=d.model_short;
    }
  }catch(e){}
}

async function loadUsers(){
  try{
    var r=await fetch(API+'/api/users');
    var d=await r.json();
    allUsers=d.users||[];
    var current=getUser();
    if(current && current !== 'default' && allUsers.indexOf(current)<0){
      allUsers.push(current);
      allUsers.sort();
    }
    _usersLoaded = true;
  }catch(e){allUsers=[];}
}


/* ══════════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════════ */

startNewChat();
loadChatList();
loadHealth();
refreshMeta();
loadUsers();

})();
