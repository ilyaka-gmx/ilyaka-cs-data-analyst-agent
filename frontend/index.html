<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Data Analyst</title>
<link rel="stylesheet" href="/frontend/styles.css?v=3">
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">CS</div>
    <span class="title">Data Analyst</span>
    <button class="admin-mode-btn" id="adminModeBtn" title="Switch to Admin mode">&#9881; Admin</button>
  </div>

  <div class="sb-user">
    <label>User</label>
    <div class="user-combo" id="userCombo">
      <input id="userId" placeholder="default" autocomplete="off">
      <div class="user-dropdown" id="userDropdown"></div>
    </div>
  </div>

  <div class="sb-actions">
    <button class="btn-new" id="btnNew">+ New Chat</button>
  </div>

  <div class="sb-search">
    <input id="searchInput" placeholder="Search chats...">
  </div>

  <div id="tagFilterArea"></div>

  <div class="sb-chats" id="chatList"></div>

  <div class="sb-section">
    <div class="sb-toggle" id="tagToggle">
      <span class="arrow" id="tagsArrow">&#9654;</span> Chat Tags
    </div>
    <div class="sb-panel" id="tagsPanel"></div>
  </div>

  <div class="rec-toggles" id="recToggles">
    <label class="rec-toggle-row"><input type="checkbox" id="autoRecToggle" checked> Auto recommendations</label>
    <label class="rec-toggle-row"><input type="checkbox" id="pastSessionsToggle"> Use past sessions</label>
    <label class="rec-toggle-row"><input type="checkbox" id="qualityScoringToggle"> Judge evaluation &amp; scoring</label>
    <label class="rec-toggle-row"><input type="checkbox" id="reflectionToggle" checked> Agent reflection</label>
    <label class="rec-toggle-row"><input type="checkbox" id="decompositionToggle" checked> Query decomposition</label>
  </div>

  <div class="sb-stats" id="adminSidebar" style="display:none"></div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="chat" id="tabChat">Chat</button>
    <button class="tab-btn" data-tab="admin" id="tabAdmin" style="display:none">Chat Tracing</button>
    <button class="tab-btn" data-tab="memory" id="tabMemory" style="display:none">Memory Insights</button>
    <div class="tab-bar-right">
      <button class="tab-action" id="exportBtn" title="Export conversation as Markdown">Export &#8595;</button>
      <div class="theme-seg" id="themeSeg">
        <button data-tv="system" title="Follow system preference">Auto</button>
        <button data-tv="light" title="Light theme">&#9788;</button>
        <button data-tv="dark" title="Dark theme">&#9789;</button>
      </div>
    </div>
  </div>

  <!-- CHAT TAB -->
  <div class="tab-content active" id="chatTab">
    <div class="messages" id="messages"></div>
    <div class="compose">
      <input id="queryInput" placeholder="Ask about the customer service dataset...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div class="tab-content" id="adminTab">
    <div class="admin" id="adminContent"></div>
  </div>

  <!-- MEMORY INSIGHTS TAB -->
  <div class="tab-content" id="memoryTab">
    <div class="memory-tab" id="memoryContent"></div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="health-seg" id="healthSeg">&#9898; loading...</span>
    <span class="sep">|</span>
    <span id="datasetSeg">loading...</span>
    <span class="sep">|</span>
    <span id="tokenSeg">0 tok</span>
    <span class="sep">|</span>
    <span id="modelSeg">loading...</span>
  </div>
</div>

<script src="/frontend/js/state.js?v=3"></script>
<script src="/frontend/js/theme.js?v=3"></script>
<script src="/frontend/js/user.js?v=3"></script>
<script src="/frontend/js/tabs.js?v=3"></script>
<script src="/frontend/js/chatlist.js?v=3"></script>
<script src="/frontend/js/tags.js?v=3"></script>
<script src="/frontend/js/chat.js?v=3"></script>
<script src="/frontend/js/admin.js?v=3"></script>
<script src="/frontend/js/memory.js?v=3"></script>
<script src="/frontend/js/quality.js?v=3"></script>
<script src="/frontend/js/statusbar.js?v=3"></script>
<script>App.init();</script>
</body>
</html>
